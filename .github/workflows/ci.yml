name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --legacy-peer-deps
      - name: Ensure next-env.d.ts exists
        run: test -f next-env.d.ts || echo '/// <reference types="next" />' > next-env.d.ts
      - run: npx tsc --noEmit
